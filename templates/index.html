<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カジラク・コンシェルジュ</title>
    <style>
        :root { --main-bg: #f4f1ea; --olive: #6b705c; --text: #333; }
        body { background-color: var(--main-bg); color: var(--text); font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 500px; width: 100%; border-top: 5px solid var(--olive); }
        h1 { color: var(--olive); font-size: 1.5rem; text-align: center; }
        .loading { text-align: center; font-style: italic; color: #999; }
        .recipe-name { font-weight: bold; font-size: 1.2rem; border-bottom: 2px solid var(--olive); padding-bottom: 5px; margin-bottom: 15px; }
        .tag { display: inline-block; background: var(--olive); color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; margin-right: 5px; }
        ul, ol { padding-left: 20px; line-height: 1.6; }
        .save-btn { margin-top: 20px; background: var(--olive); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card" id="recipe-card">
        <h1>カジラク・コンシェルジュ</h1>
        <div id="content" class="loading">コンシェルジュが献立を検討中です...</div>
    </div>

    <script>
        async function loadRecipe() {
            // 💡 URLの「#query=」の後ろにある食材データを取得する魔法
            const hash = window.location.hash;
            let query = "おまかせ";
            if (hash && hash.includes("query=")) {
                query = decodeURIComponent(hash.split("query=")[1]);
            }

            try {
                // 取得した食材（鶏もも肉など）をAIに正しく伝える
                const response = await fetch(`/api/generate-recipe?query=${query}`);
                const data = await response.json();

                const content = document.getElementById('content');
                content.className = ""; // loadingクラスを消す
                
                content.innerHTML = `
                    <div class="recipe-name">${data.name}</div>
                    <div><span class="tag">${data.time}</span><span class="tag">${data.cost}</span></div>
                    <p>💡 コツ：${data.tip}</p>
                    <strong>材料：</strong>
                    <ul>${data.ingredients.map(i => `<li>${i.name}: ${i.amount}</li>`).join('')}</ul>
                    <strong>作り方：</strong>
                    <ol>${data.steps.map(s => `<li>${s}</li>`).join('')}</ol>
                    <button class="save-btn" onclick="alert('画像を保存する機能は準備中です！スクリーンショットを撮って保存してくださいね。')">📸 レシピ画像を保存</button>
                `;
            } catch (error) {
                document.getElementById('content').innerText = "申し訳ありません。レシピの作成に失敗しました。";
            }
        }

        // ページが開いたらすぐにレシピを読み込む
        window.onload = loadRecipe;
    </script>
</body>
</html>
